version: v2

modules:
  - path: proto
    name: buf.build/trogonstack/trogon-proto

deps:
  - buf.build/elixir-protobuf/protobuf
  - buf.build/protocolbuffers/wellknowntypes

lint:
  use:
    - STANDARD
  ignore_only:
    # Keep this enum aligned with google.rpc.Code naming and numbering.
    ENUM_VALUE_PREFIX:
      - proto/trogon/error/v1alpha1/code.proto
    # Keep the zero value compatible with the local error-only mirror of
    # google.rpc.Code, which intentionally uses `UNSPECIFIED` instead of the
    # repo-wide `_UNSPECIFIED` suffix convention.
    ENUM_ZERO_VALUE_SUFFIX:
      - proto/trogon/error/v1alpha1/code.proto
  disallow_comment_ignores: true

breaking:
  use:
    - FILE
