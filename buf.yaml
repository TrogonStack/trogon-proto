version: v2

modules:
  - path: proto
    name: buf.build/trogonstack/trogon-proto

deps:
  - buf.build/elixir-protobuf/protobuf
  - buf.build/protocolbuffers/wellknowntypes

lint:
  use:
    - STANDARD
  ignore_only:
    # Keep this enum aligned with google.rpc.Code naming and numbering.
    ENUM_FIRST_VALUE_ZERO:
      - proto/trogon/error/v1alpha1/code.proto
    ENUM_VALUE_PREFIX:
      - proto/trogon/error/v1alpha1/code.proto
    # Use proto2 required fields for this custom options wrapper so template
    # definitions cannot omit the canonical error contract fields.
    FIELD_NOT_REQUIRED:
      - proto/trogon/error/v1alpha1/options.proto
  disallow_comment_ignores: true

breaking:
  use:
    - FILE
