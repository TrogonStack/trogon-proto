syntax = "proto3";
package trogon.nats.micro.v1alpha1;

import "elixirpb.proto";
import "google/protobuf/descriptor.proto";

option (elixirpb.file).module_prefix = "TrogonProto.Nats.Micro.V1Alpha1";

// ContentType selects the NATS message Content-Type used by generated clients
// and handlers.
enum ContentType {
  // CONTENT_TYPE_UNSPECIFIED allows CONTENT_TYPE_PROTOBUF and CONTENT_TYPE_JSON.
  CONTENT_TYPE_UNSPECIFIED = 0;

  // CONTENT_TYPE_PROTOBUF maps to application/protobuf.
  CONTENT_TYPE_PROTOBUF = 1;

  // CONTENT_TYPE_JSON maps to application/json.
  CONTENT_TYPE_JSON = 2;
}

// ServiceOptions defines service-level NATS Services metadata.
message ServiceOptions {
  // TODO: Enable when generators need explicit service naming controls.
  // optional string endpoint_prefix = 1;
  // optional string name = 2;

  // version is the NATS Services discovery version. If unset, generators use
  // their configured default.
  optional string version = 3;

  // description is the NATS Services discovery description. If unset,
  // generators may leave it empty or derive a target-specific default.
  optional string description = 4;

  // metadata is copied into service discovery metadata.
  map<string, string> metadata = 5;

  // content_type restricts the NATS message Content-Type header generated
  // clients may send and generated handlers accept for request and response
  // payloads. If unset, generators support CONTENT_TYPE_PROTOBUF and
  // CONTENT_TYPE_JSON.
  ContentType content_type = 6;
}

// MethodOptions defines method-level NATS endpoint metadata.
message MethodOptions {
  // TODO: Enable when generators need explicit endpoint naming controls.
  // optional string endpoint_name = 1;
  // optional string endpoint_subject = 2;

  // metadata is copied into endpoint discovery metadata.
  map<string, string> metadata = 3;
}

extend google.protobuf.ServiceOptions {
  // service specifies NATS Services metadata for a protobuf service.
  //
  // Example:
  //
  //   service OrderService {
  //     option (trogon.nats.micro.v1alpha1.service) = {
  //       version: "1.0.0"
  //     };
  //   }
  optional ServiceOptions service = 870014;
}

extend google.protobuf.MethodOptions {
  // method specifies NATS endpoint metadata for a protobuf RPC method.
  //
  // Example:
  //
  //   rpc GetOrder(GetOrderRequest) returns (Order) {
  //     option (trogon.nats.micro.v1alpha1.method) = {
  //       metadata: { key: "operation" value: "read" }
  //     };
  //   }
  optional MethodOptions method = 870015;
}
