syntax = "proto2";
package trogon.error.v1alpha1;

import "elixirpb.proto";

option (elixirpb.file).module_prefix = "TrogonProto.Error.V1Alpha1";

// Code mirrors the error values from `google.rpc.Code` so typed error
// templates can point at the canonical Google RPC error space without
// importing `google.rpc`.
//
// Source:
// https://github.com/googleapis/googleapis/blob/master/google/rpc/code.proto
enum Code {
  CANCELLED = 1;
  UNKNOWN = 2;
  INVALID_ARGUMENT = 3;
  DEADLINE_EXCEEDED = 4;
  NOT_FOUND = 5;
  ALREADY_EXISTS = 6;
  PERMISSION_DENIED = 7;
  RESOURCE_EXHAUSTED = 8;
  FAILED_PRECONDITION = 9;
  ABORTED = 10;
  OUT_OF_RANGE = 11;
  UNIMPLEMENTED = 12;
  INTERNAL = 13;
  UNAVAILABLE = 14;
  DATA_LOSS = 15;
  UNAUTHENTICATED = 16;
}
